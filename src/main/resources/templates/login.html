<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login Page</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 350px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; opacity: 0.8; }
        input {
            width: 100%; padding: 12px; border: none;
            border-radius: 8px; background: rgba(255,255,255,0.2);
            color: #fff; outline: none; transition: 0.3s;
        }
        input::placeholder { color: #ddd; }
        input:focus { background: rgba(255,255,255,0.3); box-shadow: 0 0 10px rgba(255,255,255,0.1); }
        button {
            width: 100%; padding: 14px; background: #fff;
            color: #1e3c72; border: none; border-radius: 8px;
            cursor: pointer; font-size: 16px; font-weight: bold;
            margin-top: 20px; transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .error-message {
            background: rgba(231, 76, 60, 0.2); color: #ff9f94;
            padding: 10px; border-radius: 8px; margin-bottom: 20px;
            font-size: 13px; border: 1px solid #e74c3c;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>LOGIN PORTAL</h2>
    <div th:if="${error}" class="error-message">
        <span th:text="${error}">Username atau password salah</span>
    </div>
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit">SIGN IN</button>
    </form>
</div>
</body>
</html>
